name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/meal-planner-app
          git pull origin main
          cd backend
          npm install
          pm2 restart meal-planner-backend
          cd ../frontend
          npm install
          npm run build
          chmod -R 755 /home/ubuntu/meal-planner-app/frontend/build
          sudo systemctl restart nginx
